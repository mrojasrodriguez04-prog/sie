<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro sede</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/registroSede.css') }}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-+qdLaB5m0v1k1eE3fR2eT5t1A4J0t9jWbi7r1ikT9VgW8ZfFfJp8eFZk8GZP2F6R"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="mensaje-container">
      {% with mensajes = get_flashed_messages() %} {% if mensajes %} {% for
      mensaje in mensajes %}
      <div class="mensaje">{{ mensaje }}</div>
      {% endfor %} {% endif %} {% endwith %}
    </div>

    <div class="top-bar">
      <a href="/empresa/{{ empresa.id_empresa }}/sedes" class="btn-volver"
        >Volver</a
      >
    </div>

    <div class="form-container">
      <h2>Registrar sede</h2>
      <h3>Empresa: {{ empresa.nombre_empresa }}</h3>
      <h3>
        Empresario: {{ empresario.nombres_completos }} {{ empresario.apellidos
        }}
      </h3>

      <form action="/guardar_sede/{{ empresa.id_empresa }}" method="POST">
        <div class="input-group">
          <label>Nombre de la sede</label>
          <input type="text" name="nombre_sede" required />
        </div>

        <div class="input-group">
          <label>Dirección</label>
          <input type="text" name="direccion" required />
        </div>

        <button type="submit">Guardar</button>
      </form>
    </div>
  </body>
</html>
